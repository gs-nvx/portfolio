spring:
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=true&serverTimezone=Europe/Rome
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USER}
    password: ${MAIL_PASSWORD}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

logging:
  level:
    root: WARN
    com.tuonome.portfolio: INFO

app:
  mail:
    from: ${MAIL_FROM}
    to: ${MAIL_TO}
  uploads:
    base-url: https://gstcodelab.com/uploads

hcaptcha:
  secret: ${HCAPTCHA_SECRET}