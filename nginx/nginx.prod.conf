events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server {
        listen 80;
        server_name gstcodelab.com www.gstcodelab.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name gstcodelab.com www.gstcodelab.com;

        ssl_certificate     /etc/letsencrypt/live/gstcodelab.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/gstcodelab.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;

        add_header X-Frame-Options SAMEORIGIN;
        add_header X-Content-Type-Options nosniff;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains";

        location /uploads/ {
            alias /usr/share/nginx/uploads/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        location /admin {
            alias /usr/share/nginx/admin;
            try_files $uri $uri/ /admin/index.html;
        }

        location /api/ {
            proxy_pass http://spring-app:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            root /usr/share/nginx/public;
            try_files $uri $uri/ /index.html;
        }
    }
}